<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Attendance Management System</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header class="header">
            <div>
                <h1>Student Attendance Management System</h1>
                <p>Admin Dashboard</p>
            </div>
            <button id="themeToggle" class="theme-toggle">
                <i class="fa-solid fa-moon"></i>
                <span>Dark Mode</span>
            </button>
        </header>
        <section class="dashboard">
            <div class="card total-card">
                <h3>Total Students</h3>
                <p id="totalStudents">0</p>
            </div>
            <div class="card present-card">
                <h3>Present</h3>
                <p id="presentCount">0</p>
            </div>
            <div class="card absent-card">
                <h3>Absent</h3>
                <p id="absentCount">0</p>
            </div>
            <div class="card percentage-card">
                <h3>Attendance %</h3>
                <p id="attendancePercentage">0%</p>
            </div>
        </section>
        <section class="control-panel">
            <div class="input-group">
                <label>Attendance Date</label>
                <input type="date" id="attendanceDate">
            </div>
            <div class="input-group">
                <label>Search Student</label>
                <input type="text" id="searchStudent" placeholder="Search by Name / Roll Number / Student ID">
            </div>
            <button id="openAddStudentModal" class="btn add-btn">
                <i class="fa-solid fa-user-plus"></i>
                Add Student
            </button>
            <button id="saveAttendanceBtn" class="btn save-btn">
                <i class="fa-solid fa-floppy-disk"></i>
                Save Attendance
            </button>
        </section>
        <section class="table-section">
            <table>
                <thead>
                    <tr>
                        <th>Student ID</th>
                        <th>Roll Number</th>
                        <th>Student Name</th>
                        <th>Department</th>
                        <th>Semester</th>
                        <th>Status</th>
                        <th>Attendance</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody">
                </tbody>
            </table>
        </section>
    </div>
    <div class="modal" id="addStudentModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add Student</h2>
                <button class="close-modal" id="closeAddModal">
                    &times;
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Student Name</label>
                    <input type="text" id="studentName">
                </div>
                <div class="form-group">
                    <label>Roll Number</label>
                    <input type="text" id="rollNumber">
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <select id="department">
                        <option value="">Select Department</option>
                        <option>CSE</option>
                        <option>AI & DS</option>
                        <option>IT</option>
                        <option>ECE</option>
                        <option>EEE</option>
                        <option>ME</option>
                        <option>CE</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Semester</label>
                    <select id="semester">
                        <option value="">Select Semester</option>
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                        <option>5</option>
                        <option>6</option>
                        <option>7</option>
                        <option>8</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn cancel-btn" id="cancelAddStudent">
                    Cancel
                </button>
                <button class="btn add-btn" id="saveStudentBtn">
                    Save Student
                </button>
            </div>
        </div>
    </div>
    <div class="modal" id="editStudentModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Student</h2>
                <button class="close-modal" id="closeEditModal">
                    &times;
                </button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editStudentId">
                <div class="form-group">
                    <label>Student Name</label>
                    <input type="text" id="editStudentName">
                </div>
                <div class="form-group">
                    <label>Roll Number</label>
                    <input type="text" id="editRollNumber">
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <select id="editDepartment">
                        <option>CSE</option>
                        <option>AI & DS</option>
                        <option>IT</option>
                        <option>ECE</option>
                        <option>EEE</option>
                        <option>ME</option>
                        <option>CE</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Semester</label>
                    <select id="editSemester">
                        <option>I</option>
                        <option>II</option>
                        <option>III</option>
                        <option>IV</option>
                        <option>V</option>
                        <option>VI</option>
                        <option>VII</option>
                        <option>VIII</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn cancel-btn" id="cancelEditStudent">
                    Cancel
                </button>
                <button class="btn save-btn" id="updateStudentBtn">
                    Update Student
                </button>
            </div>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>

</html>
