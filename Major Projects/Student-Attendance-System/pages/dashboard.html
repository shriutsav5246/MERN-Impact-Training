<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>

<body>

    <div class="layout">

        <!-- Sidebar -->

        <aside class="sidebar">

            <div class="logo">
                <h2>SAMS</h2>
            </div>

            <ul class="menu">
                <li class="active">
                    <a href="dashboard.html">Dashboard</a>
                </li>

                <li>
                    <a href="students.html">Students</a>
                </li>

                <li>
                    <a href="attendance.html">Attendance</a>
                </li>

                <li>
                    <a href="reports.html">Reports</a>
                </li>

                <li>
                    <a href="settings.html">Settings</a>
                </li>
            </ul>

        </aside>

        <!-- Main Content -->

        <main class="main-content">

            <header class="topbar">

                <div>
                    <h1>Student Attendance Management System</h1>
                </div>

                <div class="profile">
                    Admin
                </div>

            </header>

            <!-- Statistics -->

            <section class="stats-grid">

                <div class="stat-card">
                    <h2 id="totalStudents">0</h2>
                    <p>Total Students</p>
                </div>

                <div class="stat-card">
                    <h2 id="presentStudents">0</h2>
                    <p>Present Today</p>
                </div>

                <div class="stat-card">
                    <h2 id="absentStudents">0</h2>
                    <p>Absent Today</p>
                </div>

                <div class="stat-card">
                    <h2 id="attendanceRate">0%</h2>
                    <p>Attendance Rate</p>
                </div>

            </section>

            <!-- Dashboard Panels -->

            <section class="dashboard-panels">

                <div class="panel">
                    <h3>Recent Activity</h3>

                    <div id="activityList">
                        No activity available
                    </div>
                </div>

                <div class="panel">
                    <h3>Quick Actions</h3>

                    <button class="action-btn">
                        Add Student
                    </button>

                    <button class="action-btn">
                        Mark Attendance
                    </button>

                    <button class="action-btn">
                        Generate Report
                    </button>
                </div>

            </section>

        </main>

    </div>

</body>

</html>
